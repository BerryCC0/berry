name: Sync trait art

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run sync-trait-art
        env:
          RPC_URL: ${{ secrets.SYNC_TRAIT_ART_RPC_URL }}

      - name: Open PR if drift detected
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: sync/trait-art
          title: 'Sync trait art from descriptor'
          commit-message: 'Sync trait art from on-chain descriptor'
          add-paths: app/lib/nouns/utils/image-data.ts
          body: |
            Auto-detected drift between on-chain trait counts and `app/lib/nouns/utils/image-data.ts`.

            New entries have placeholder filenames (e.g., `accessory-new-145`). **Rename them to match the proposal that added them before merging.**

            Generated by `.github/workflows/sync-trait-art.yml`.
